<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Technique - Projet Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #ffffff;
        }
        
        .box-solid {
            background: white;
            border: 3px solid #000;
        }
        
        .box-dashed {
            background: white;
            border: 2px dashed #666;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-[1600px] mx-auto">
        
        <!-- En-tête -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-black mb-3 tracking-tight">
                ARCHITECTURE TECHNIQUE
            </h1>
            <p class="text-gray-600 text-xl font-semibold">Stack Technologique du Projet</p>
        </div>

        <!-- Schéma Principal -->
        <div class="relative">
            
            <!-- SVG pour les flèches -->
            <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;">
                <defs>
                    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="3.5" orient="auto">
                        <polygon points="0 0, 12 3.5, 0 7" fill="#000"/>
                    </marker>
                </defs>
                
                <!-- Frontend → API REST -->
                <line x1="50%" y1="165" x2="50%" y2="255" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
                
                <!-- API REST → FastAPI -->
                <line x1="50%" y1="350" x2="50%" y2="445" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
                
                <!-- API REST → DevOps (ligne diagonale) -->
                <path d="M 900 305 L 1130 305" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
                
                <!-- FastAPI → MySQL -->
                <line x1="420" y1="540" x2="240" y2="690" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
                
                <!-- FastAPI → MongoDB -->
                <line x1="600" y1="540" x2="530" y2="690" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
                
                <!-- FastAPI → MINIO -->
                <line x1="850" y1="540" x2="1150" y2="690" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)"/>
                
                <!-- FastAPI → OpenRouter (ligne vers la droite) -->
                <path d="M 900 490 L 1130 490" stroke="#000" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
            </svg>

            <div class="relative space-y-10" style="z-index: 1;">
                
                <!-- Ligne 1: Frontend -->
                <div class="flex justify-center">
                    <div class="box-solid px-16 py-8 inline-flex items-center gap-8">
                        <div class="flex gap-6">
                            <i class="fa-brands fa-apple text-5xl text-black"></i>
                            <i class="fa-brands fa-android text-5xl text-green-600"></i>
                        </div>
                        <div class="h-16 w-px bg-gray-400"></div>
                        <div class="text-center">
                            <p class="text-2xl font-black text-black">Frontend</p>
                            <p class="text-base text-gray-600 font-semibold mt-1">React Native</p>
                        </div>
                        <div class="h-16 w-px bg-gray-400"></div>
                        <i class="fa-brands fa-react text-5xl text-blue-500"></i>
                    </div>
                </div>

                <!-- Ligne 2: API REST + DevOps -->
                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-7">
                        <div class="box-solid p-8 h-full flex items-center justify-center">
                            <div class="text-center">
                                <p class="text-2xl font-black text-black mb-2">API REST</p>
                                <div class="flex items-center justify-center gap-3 mt-3">
                                    <i class="fa-solid fa-code text-3xl text-gray-700"></i>
                                    <p class="text-base text-gray-600 font-semibold">FastAPI • Python</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-span-5">
                        <div class="box-dashed p-6 h-full flex flex-col justify-center">
                            <p class="text-xl font-black text-black text-center mb-4">CI/CD & DevOps</p>
                            <div class="flex justify-center gap-10">
                                <div class="text-center">
                                    <i class="fa-brands fa-github text-5xl mb-2 text-black"></i>
                                    <p class="text-base font-semibold text-black">GitHub</p>
                                </div>
                                <div class="text-center">
                                    <i class="fa-brands fa-docker text-5xl text-blue-600 mb-2"></i>
                                    <p class="text-base font-semibold text-black">Docker</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ligne 3: FastAPI + IA -->
                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-7">
                        <div class="box-dashed p-8 h-full flex items-center justify-center">
                            <div class="flex items-center gap-6">
                                <i class="fa-solid fa-server text-5xl text-green-600"></i>
                                <div class="text-center">
                                    <p class="text-2xl font-black text-black">FastAPI</p>
                                    <p class="text-base text-gray-600 font-semibold mt-1">Logique Métier • Validation</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-span-5">
                        <div class="box-dashed p-6 h-full flex flex-col justify-center">
                            <div class="text-center">
                                <i class="fa-solid fa-brain text-5xl text-purple-600 mb-3"></i>
                                <p class="text-xl font-black text-black">Intelligence Artificielle</p>
                                <p class="text-base text-gray-600 font-semibold mt-1">OpenRouter</p>
                                <div class="flex gap-3 justify-center mt-3">
                                    <span class="text-sm font-bold bg-purple-100 px-4 py-2 rounded border-2 border-purple-300">GPT-4</span>
                                    <span class="text-sm font-bold bg-purple-100 px-4 py-2 rounded border-2 border-purple-300">Claude</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ligne 4: Bases de données -->
                <div class="grid grid-cols-4 gap-6">
                    <div class="box-dashed p-8 text-center">
                        <i class="fa-solid fa-database text-6xl text-blue-600 mb-4"></i>
                        <p class="text-xl font-black text-black mb-2">MySQL</p>
                        <p class="text-base text-gray-600 font-semibold">Base relationnelle</p>
                    </div>
                    
                    <div class="box-dashed p-8 text-center">
                        <i class="fa-brands fa-envira text-6xl text-green-600 mb-4"></i>
                        <p class="text-xl font-black text-black mb-2">MongoDB</p>
                        <p class="text-base text-gray-600 font-semibold">NoSQL</p>
                    </div>
                    
                    <div class="box-dashed p-8 text-center">
                        <i class="fa-solid fa-box text-6xl text-pink-600 mb-4"></i>
                        <p class="text-xl font-black text-black mb-2">MINIO</p>
                        <p class="text-base text-gray-600 font-semibold">Stockage objets</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
