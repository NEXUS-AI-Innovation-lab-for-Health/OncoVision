name: Build

on:
  push:
    branches:
        - main

jobs:

  app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v2
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host

      - name: Build and Push app image
        working-directory: app
        run: |
          docker build -t localhost:5000/sae-app:latest -f Dockerfile .
          docker push localhost:5000/sae-app:latest
    
  rest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v2
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host

      - name: Build and Push rest image
        working-directory: rest
        run: |
          docker build -t localhost:5000/sae-rest:latest -f Dockerfile .
          docker push localhost:5000/sae-rest:latest

  sync-compose:
    runs-on: ubuntu-latest
    container:
      image: node:16-buster-slim
      volumes:
        - /home/super_crafting/sae:/sae  

    steps:
      - uses: actions/checkout@v6

      - name: Copy compose file to workspace
        run: |
          cp compose.yml /sae/docker/compose.yml