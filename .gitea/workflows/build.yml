name: Build

on:
  push:
    branches:
        - main

jobs:

  app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: localhost:5000/sae-app:latest
    
  rest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Build and push rest image
        uses: docker/build-push-action@v6
        with:
          context: ./rest
          file: ./rest/Dockerfile
          push: true
          tags: localhost:5000/sae-rest:latest