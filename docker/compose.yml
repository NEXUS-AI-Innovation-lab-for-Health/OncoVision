services:

  mysql:
    image: mysql:8.0
    container_name: onco_sql
    env_file:
      - ../.env
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - onco_network

  minio:
    image: minio/minio
    container_name: onco_minio
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./volumes/minio:/data
    networks:
      - onco_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: onco_phpmyadmin
    env_file:
      - ../.env
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - onco_network

  mongodb:
    image: mongo:8.2.1
    container_name: onco_mongo
    env_file:
      - ../.env
    volumes:
      - ./volumes/mongo:/data/db
    ports:
      - "27017:27017"
    networks:
      - onco_network

networks:
  onco_network:
    name: onco_network
    driver: bridge
